# CI de nível 02 - Execução agendada

#nome da pipeline
name: 'Execução agendada'

# gatilhos/triggers - regras de disparo
# gatilho manual - workflow_dispatch
on:
  schedule:
    # Cronograma de execução
    - cron: '03 21 * * *'

# tarefas dentro da pipeline
jobs:
  #nome do job
  e2e-tests:
    #maquina onde o job vai rodar
    runs-on: ubuntu-latest
    #passos do job
    steps:
      #clone do projeto
      - uses: actions/checkout@v4

      #instalação do node
      - uses: actions/setup-node@v4
        with:
          node-version: 24.x

      #instalação do Yarn
      - name: Instalando Yarn
        run: npm install -g yarn   

      #instalação das dependências
      - name: Instalando dependências
        run: yarn

      #instalaçãa dos browsers do playwright
      - name: Intalando browsers do playwright
        run: yarn playwright install

      #executar os testes e2e
      - name: Executando os testes e2e
        run: yarn run e2e     