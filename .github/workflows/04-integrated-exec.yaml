# CI de nível 03 - Pipeline integrada ao buld do código
#nome da pipeline
name: 'Execução integrada'

# gatilhos/triggers - regras de disparo
# gatilho manual - workflow_dispatch
# gatilho agendado = schedule
# gatilho por conclusão de outra pipeline = workflow_run
on:
  workflow_dispatch:

# tarefas dentro da pipeline
jobs:
  #nome do job
  inspecao:
    #maquina onde o job vai rodar
    runs-on: ubuntu-latest
    #passos do job
    steps:
      #clone do projeto
      - uses: actions/checkout@v4

      #instalação do node
      - uses: actions/setup-node@v4
        with:
          node-version: latest

      #instalação do Yarn
      - name: Instalando Yarn
        run: npm install -g yarn

      #instalação das dependências
      - name: Instalando dependências
        run: yarn

      - name: Inspeção de código
        run: yarn lint

  unidade:
    runs-on: ubuntu-latest
    needs: [inspecao]

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: latest

      - name: Instalando dependências
        run: yarn

      - name: Rodando testes unitários
        run: yarn run test

  e2e-tests:
    runs-on: ubuntu-latest
    needs: [inspecao]

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: latest

      - name: Instalando yarn
        run: npm install -g yarn

      - name: Instalando dependências
        run: yarn

      - name: Instalando browsers do Palywright
        run: yarn playwright install

      - name: Executando testes E2E
        run: yarn run e2e

  deploy:
    runs-on: ubuntu-latest
    needs: [unidade, e2e-tests]

    steps:
      - name: Simulação de deploy
        run: exho 'Deploy sendo realizado'
